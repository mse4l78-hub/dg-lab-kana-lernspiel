<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kana Lernspiel - Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 max-w-md w-full border border-white/20 shadow-2xl fade-in">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🎂</div>
            <h1 class="text-3xl font-bold text-white mb-2">Kana Lernspiel</h1>
            <p class="text-purple-200">Server-Konfiguration</p>
        </div>

        <div id="current-config" class="mb-6 p-4 bg-black/20 rounded-lg">
            <h3 class="text-white font-bold mb-2">Aktuelle Konfiguration:</h3>
            <div class="text-purple-200 text-sm space-y-1">
                <div>IP: <span id="current-ip" class="text-white font-mono">-</span></div>
                <div>Port: <span id="current-port" class="text-white font-mono">-</span></div>
                <div>Status: <span id="server-status" class="text-yellow-400">Lädt...</span></div>
            </div>
        </div>

        <form id="config-form" class="space-y-4">
            <div>
                <label class="block text-purple-200 text-sm mb-2">Server IP-Adresse</label>
                <input type="text" id="server-ip" placeholder="z.B. 192.168.0.168" 
                    class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-purple-300/50 focus:outline-none focus:border-purple-400 transition"
                    pattern="^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$">
                <p class="text-purple-300/60 text-xs mt-1">Deine lokale IP-Adresse im Netzwerk</p>
            </div>

            <div>
                <label class="block text-purple-200 text-sm mb-2">Port (optional)</label>
                <input type="number" id="server-port" placeholder="18888" 
                    class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-purple-300/50 focus:outline-none focus:border-purple-400 transition"
                    min="1024" max="65535" value="18888">
            </div>

            <button type="submit" 
                class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold rounded-lg hover:from-purple-500 hover:to-pink-500 transition transform hover:scale-[1.02] active:scale-[0.98]">
                💾 Konfiguration speichern & Server starten
            </button>
        </form>

        <div class="mt-6 text-center">
            <button id="detect-ip" class="text-purple-300 hover:text-white text-sm underline transition">
                🔍 Meine IP-Adresse automatisch erkennen
            </button>
        </div>

        <div id="message" class="mt-4 p-3 rounded-lg text-center hidden"></div>
    </div>

    <script>
        // Lade aktuelle Konfiguration
        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                document.getElementById('current-ip').textContent = config.serverIp || 'Nicht gesetzt';
                document.getElementById('current-port').textContent = config.port || '18888';
                document.getElementById('server-ip').value = config.serverIp || '';
                document.getElementById('server-port').value = config.port || '18888';
                
                // Prüfe Server-Status
                checkServerStatus();
            } catch (e) {
                document.getElementById('server-status').textContent = 'Fehler beim Laden';
                document.getElementById('server-status').className = 'text-red-400';
            }
        }

        async function checkServerStatus() {
            try {
                const response = await fetch('/api/server-status');
                const status = await response.json();
                const statusEl = document.getElementById('server-status');
                if (status.running) {
                    statusEl.textContent = 'Läuft ✅';
                    statusEl.className = 'text-green-400';
                } else {
                    statusEl.textContent = 'Gestoppt ⏹️';
                    statusEl.className = 'text-red-400';
                }
            } catch (e) {
                document.getElementById('server-status').textContent = 'Unbekannt';
            }
        }

        // IP automatisch erkennen
        document.getElementById('detect-ip').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/detect-ip');
                const data = await response.json();
                if (data.ip) {
                    document.getElementById('server-ip').value = data.ip;
                    showMessage('IP-Adresse erkannt: ' + data.ip, 'success');
                } else {
                    showMessage('Konnte IP nicht automatisch erkennen', 'error');
                }
            } catch (e) {
                showMessage('Fehler: ' + e.message, 'error');
            }
        });

        // Formular absenden
        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ip = document.getElementById('server-ip').value.trim();
            const port = parseInt(document.getElementById('server-port').value) || 18888;

            if (!ip) {
                showMessage('Bitte gib eine IP-Adresse ein', 'error');
                return;
            }

            // IP-Validierung
            const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            if (!ipRegex.test(ip)) {
                showMessage('Ungültige IP-Adresse', 'error');
                return;
            }

            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ serverIp: ip, port })
                });
                
                const result = await response.json();
                if (result.success) {
                    showMessage('✅ Konfiguration gespeichert! Server wird gestartet...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showMessage('❌ Fehler: ' + result.error, 'error');
                }
            } catch (e) {
                showMessage('❌ Fehler: ' + e.message, 'error');
            }
        });

        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'mt-4 p-3 rounded-lg text-center fade-in ' + 
                (type === 'success' ? 'bg-green-500/20 text-green-300' : 'bg-red-500/20 text-red-300');
            msgEl.classList.remove('hidden');
        }

        // Initial laden
        loadConfig();
    </script>
</body>
</html>
